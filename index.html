<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3266ad">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="売上管理">
<title>床屋 売上管理</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18}
.app{max-width:720px;margin:0 auto;min-height:100vh;background:#fff;position:relative}

/* ヘッダー */
.header{background:#3266ad;color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600;letter-spacing:0.02em}
.header .sub{font-size:12px;opacity:0.8;margin-top:2px}

/* タブ */
.tabs{display:flex;border-bottom:1px solid #e8e8e3;background:#fff;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:11px 4px;font-size:13px;cursor:pointer;border:none;background:none;color:#888780;border-bottom:2px solid transparent;transition:all 0.15s}
.tab.active{color:#3266ad;font-weight:600;border-bottom-color:#3266ad}

/* セクション */
.section{display:none;padding:16px}.section.active{display:block}

/* カード */
.card{background:#fff;border:1px solid #e8e8e3;border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em}

/* メトリクス */
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:#f5f5f0;border-radius:10px;padding:12px 10px}
.metric .lbl{font-size:11px;color:#888;margin-bottom:4px}
.metric .val{font-size:18px;font-weight:700;color:#1a1a18}
.metric .val.cash{color:#185fa5}
.metric .val.cl{color:#3b6d11}
.metric .sub{font-size:10px;color:#aaa;margin-top:2px}

/* フォーム */
.form-group{margin-bottom:14px}
.form-group label{font-size:13px;font-weight:500;color:#555;display:block;margin-bottom:6px}
.form-group input{width:100%;padding:11px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;background:#fff;color:#1a1a18;transition:border 0.15s}
.form-group input:focus{outline:none;border-color:#3266ad}

/* ボタン */
.btn{padding:11px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#1a1a18;transition:all 0.15s}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#3266ad;color:#fff;border-color:#3266ad;width:100%}
.btn-primary:hover{background:#2555a0}

/* メッセージ */
.msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:10px;display:none}
.msg.ok{background:#eaf3de;color:#3b6d11}
.msg.err{background:#fcebeb;color:#a32d2d}

/* テーブル */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:#888;text-align:left;padding:7px 8px;border-bottom:1px solid #e8e8e3;background:#fafaf8}
td{padding:8px 8px;border-bottom:1px solid #f0f0ec;color:#1a1a18;vertical-align:middle}
tr:last-child td{border-bottom:none}
.num{text-align:right}
.total{font-weight:600}

/* 曜日バッジ */
.day-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700}
.d0,.d6{background:#FAECE7;color:#993C1D}
.d1,.d2,.d3,.d4,.d5{background:#E6F1FB;color:#185fa5}

/* 週ヘッダー */
.week-header td{background:#f5f5f0;font-size:12px;font-weight:600;color:#555;padding:6px 8px}

/* セレクト */
select{padding:8px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:13px;background:#fff;color:#1a1a18;cursor:pointer}
select:focus{outline:none;border-color:#3266ad}

.select-row{display:flex;gap:8px;margin-bottom:14px;align-items:center}

/* グラフボタン */
.chart-btns{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.chart-btns .btn{font-size:12px;padding:7px 14px;border-radius:8px}
.chart-btns .btn.active{background:#3266ad;color:#fff;border-color:#3266ad}

/* 削除ボタン */
.del-btn{font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid #ddd;background:none;color:#aaa}
.del-btn:hover{color:#a32d2d;border-color:#a32d2d;background:#fcebeb}

/* 空 */
.empty{text-align:center;padding:32px 16px;color:#aaa;font-size:13px}

/* グラフ */
.chart-wrap{position:relative;width:100%;height:260px;margin-top:8px}
.legend{display:flex;gap:14px;font-size:12px;color:#888;margin-bottom:6px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.legend-sq{width:10px;height:10px;border-radius:2px;display:inline-block}

/* エクスポート */
.export-btn{font-size:12px;padding:7px 14px;color:#185fa5;border-color:#b5d4f4;background:#e6f1fb}
.export-btn:hover{background:#b5d4f4}

@media(max-width:400px){
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .metric .val{font-size:16px}
}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>✂ 売上管理</h1>
  <div class="sub" id="header-date"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('input')">✏ 入力</button>
  <button class="tab" onclick="switchTab('list')">📋 一覧</button>
  <button class="tab" onclick="switchTab('summary')">📊 集計</button>
</div>

<!-- 入力 -->
<div id="sec-input" class="section active">
  <div class="card">
    <div class="card-title">売上入力</div>
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="inp-date">
    </div>
    <div class="form-group">
      <label>現金 (円)</label>
      <input type="number" id="inp-cash" placeholder="0" min="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>キャッシュレス (円)</label>
      <input type="number" id="inp-cl" placeholder="0" min="0" inputmode="numeric">
    </div>
    <button class="btn btn-primary" onclick="saveEntry()">登録する</button>
    <div class="msg" id="msg"></div>
  </div>

  <div id="today-box" style="display:none">
    <div class="metric-grid" id="today-cards"></div>
  </div>
</div>

<!-- 一覧 -->
<div id="sec-list" class="section">
  <div class="select-row">
    <select id="list-month" onchange="renderList()"></select>
    <button class="btn export-btn" onclick="exportCSV()">CSV出力</button>
    <span style="font-size:12px;color:#aaa" id="list-count"></span>
  </div>
  <div id="list-body"></div>
</div>

<!-- 集計 -->
<div id="sec-summary" class="section">
  <div class="select-row">
    <select id="sum-month" onchange="renderSummary()"></select>
  </div>

  <div class="metric-grid" id="sum-month-cards"></div>

  <div class="card">
    <div class="card-title">曜日別集計</div>
    <table>
      <thead><tr><th>曜</th><th class="num">現金合計</th><th class="num">CL合計</th><th class="num">売上合計</th><th class="num">平均</th><th class="num">日数</th></tr></thead>
      <tbody id="day-summary"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">週別集計</div>
    <table>
      <thead><tr><th>週</th><th class="num">現金合計</th><th class="num">CL合計</th><th class="num">売上合計</th><th class="num">1日平均</th></tr></thead>
      <tbody id="week-summary"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">グラフ</div>
    <div class="legend">
      <span><span class="legend-sq" style="background:#3266ad"></span>現金</span>
      <span><span class="legend-sq" style="background:#639922"></span>キャッシュレス</span>
    </div>
    <div class="chart-wrap"><canvas id="bar-chart" role="img" aria-label="売上棒グラフ"></canvas></div>
    <div class="chart-btns">
      <button class="btn active" onclick="setChart('daily',this)">日別</button>
      <button class="btn" onclick="setChart('weekly',this)">週別</button>
      <button class="btn" onclick="setChart('dayofweek',this)">曜日別</button>
    </div>
  </div>
</div>

</div><!-- /app -->

<script>
const DAYS=['日','月','火','水','木','金','土'];
const KEY='barber_sales_v2';
let chart=null,chartMode='daily';

function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}
function fmt(n){return Math.round(n).toLocaleString('ja-JP')}
function toYM(s){return s.slice(0,7)}
function dayIdx(s){return new Date(s+'T00:00:00').getDay()}
function weekNum(s){
  const d=new Date(s+'T00:00:00');
  const first=new Date(d.getFullYear(),d.getMonth(),1);
  return Math.floor((d.getDate()+first.getDay()-1)/7)+1;
}

// ヘッダー日付
(function(){
  const d=new Date();
  const wd=['日','月','火','水','木','金','土'];
  document.getElementById('header-date').textContent=
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;
  document.getElementById('inp-date').value=
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
})();

function getMonths(data){
  const s=new Set(data.map(r=>toYM(r.date)));
  const now=new Date();
  const cur=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  s.add(cur);
  return [...s].sort().reverse();
}

function populateMonthSelects(){
  const data=load();
  const months=getMonths(data);
  ['list-month','sum-month'].forEach(id=>{
    const sel=document.getElementById(id);
    const prev=sel.value;
    sel.innerHTML='';
    months.forEach(m=>{
      const [y,mo]=m.split('-');
      const o=document.createElement('option');
      o.value=m;o.textContent=`${y}年${parseInt(mo)}月`;
      sel.appendChild(o);
    });
    if(prev&&months.includes(prev))sel.value=prev;
    else sel.value=months[0];
  });
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['input','list','summary'][i]===name);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  populateMonthSelects();
  if(name==='list')renderList();
  if(name==='summary')renderSummary();
}

function saveEntry(){
  const date=document.getElementById('inp-date').value;
  const cash=parseInt(document.getElementById('inp-cash').value||0);
  const cl=parseInt(document.getElementById('inp-cl').value||0);
  if(!date){showMsg('日付を入力してください','err');return}
  if(isNaN(cash)||cash<0||isNaN(cl)||cl<0){showMsg('金額は0以上の数字を入力してください','err');return}
  const data=load();
  const idx=data.findIndex(r=>r.date===date);
  const entry={date,cash,cl,total:cash+cl};
  if(idx>=0){
    if(!confirm(`${date} のデータが既にあります。上書きしますか？`))return;
    data[idx]=entry;
  }else{data.push(entry)}
  data.sort((a,b)=>a.date.localeCompare(b.date));
  save(data);
  showMsg('登録しました ✓','ok');
  renderTodayMetrics(entry,data);
  document.getElementById('inp-cash').value='';
  document.getElementById('inp-cl').value='';
}

function showMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

function renderTodayMetrics(entry,data){
  const ym=toYM(entry.date);
  const md=data.filter(r=>toYM(r.date)===ym);
  const mTotal=md.reduce((s,r)=>s+r.total,0);
  const n=md.length;
  document.getElementById('today-cards').innerHTML=`
    <div class="metric"><div class="lbl">現金</div><div class="val cash">¥${fmt(entry.cash)}</div></div>
    <div class="metric"><div class="lbl">キャッシュレス</div><div class="val cl">¥${fmt(entry.cl)}</div></div>
    <div class="metric"><div class="lbl">本日合計</div><div class="val total">¥${fmt(entry.total)}</div></div>
    <div class="metric"><div class="lbl">月累計</div><div class="val">¥${fmt(mTotal)}</div><div class="sub">${n}営業日</div></div>
    <div class="metric"><div class="lbl">月平均/日</div><div class="val">¥${fmt(n?mTotal/n:0)}</div></div>
  `;
  document.getElementById('today-box').style.display='block';
}

function renderList(){
  const ym=document.getElementById('list-month')?.value;
  if(!ym)return;
  const data=load().filter(r=>toYM(r.date)===ym);
  document.getElementById('list-count').textContent=`${data.length}件`;
  const body=document.getElementById('list-body');
  if(!data.length){body.innerHTML='<div class="empty">この月のデータはまだありません</div>';return}

  const byWeek={};
  data.forEach(r=>{const w=weekNum(r.date);if(!byWeek[w])byWeek[w]=[];byWeek[w].push(r)});

  let html='';
  Object.keys(byWeek).sort((a,b)=>+a-+b).forEach(w=>{
    const rows=byWeek[w];
    const wTotal=rows.reduce((s,r)=>s+r.total,0);
    const wCash=rows.reduce((s,r)=>s+r.cash,0);
    const wCl=rows.reduce((s,r)=>s+r.cl,0);
    html+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">
    <table>
    <thead><tr class="week-header"><td colspan="6">第${w}週　¥${fmt(wTotal)}　（現金 ¥${fmt(wCash)} ／ CL ¥${fmt(wCl)}）</td></tr>
    <tr><th>日付</th><th>曜</th><th class="num">現金</th><th class="num">CL</th><th class="num">合計</th><th></th></tr></thead>
    <tbody>`;
    rows.forEach(r=>{
      const di=dayIdx(r.date);
      html+=`<tr>
        <td>${r.date.slice(5).replace('-','/')}</td>
        <td><span class="day-badge d${di}">${DAYS[di]}</span></td>
        <td class="num" style="color:#185fa5">¥${fmt(r.cash)}</td>
        <td class="num" style="color:#3b6d11">¥${fmt(r.cl)}</td>
        <td class="num total">¥${fmt(r.total)}</td>
        <td><button class="del-btn" onclick="deleteEntry('${r.date}')">削除</button></td>
      </tr>`;
    });
    html+='</tbody></table></div>';
  });
  body.innerHTML=html;
}

function deleteEntry(date){
  if(!confirm(`${date} のデータを削除しますか？`))return;
  save(load().filter(r=>r.date!==date));
  renderList();populateMonthSelects();
}

function exportCSV(){
  const ym=document.getElementById('list-month')?.value;
  if(!ym)return;
  const data=load().filter(r=>toYM(r.date)===ym);
  if(!data.length){alert('データがありません');return}
  let csv='日付,曜日,現金,キャッシュレス,合計\n';
  data.forEach(r=>{csv+=`${r.date},${DAYS[dayIdx(r.date)]},${r.cash},${r.cl},${r.total}\n`});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`売上_${ym}.csv`;a.click();
}

function renderSummary(){
  const ym=document.getElementById('sum-month')?.value;
  if(!ym)return;
  const data=load().filter(r=>toYM(r.date)===ym);
  const mTotal=data.reduce((s,r)=>s+r.total,0);
  const mCash=data.reduce((s,r)=>s+r.cash,0);
  const mCl=data.reduce((s,r)=>s+r.cl,0);
  const n=data.length;

  document.getElementById('sum-month-cards').innerHTML=`
    <div class="metric"><div class="lbl">月間売上合計</div><div class="val">¥${fmt(mTotal)}</div><div class="sub">${n}営業日</div></div>
    <div class="metric"><div class="lbl">現金合計</div><div class="val cash">¥${fmt(mCash)}</div></div>
    <div class="metric"><div class="lbl">CL合計</div><div class="val cl">¥${fmt(mCl)}</div></div>
    <div class="metric"><div class="lbl">1日平均</div><div class="val">¥${fmt(n?mTotal/n:0)}</div></div>
    <div class="metric"><div class="lbl">現金比率</div><div class="val">${mTotal?Math.round(mCash/mTotal*100):0}%</div></div>
    <div class="metric"><div class="lbl">CL比率</div><div class="val">${mTotal?Math.round(mCl/mTotal*100):0}%</div></div>
  `;

  const byDay=Array.from({length:7},()=>({cash:0,cl:0,total:0,count:0}));
  data.forEach(r=>{const i=dayIdx(r.date);byDay[i].cash+=r.cash;byDay[i].cl+=r.cl;byDay[i].total+=r.total;byDay[i].count++});
  let dHtml='';
  DAYS.forEach((d,i)=>{
    if(!byDay[i].count)return;
    const avg=byDay[i].total/byDay[i].count;
    dHtml+=`<tr>
      <td><span class="day-badge d${i}">${d}</span></td>
      <td class="num" style="color:#185fa5">¥${fmt(byDay[i].cash)}</td>
      <td class="num" style="color:#3b6d11">¥${fmt(byDay[i].cl)}</td>
      <td class="num total">¥${fmt(byDay[i].total)}</td>
      <td class="num">¥${fmt(avg)}</td>
      <td class="num">${byDay[i].count}</td>
    </tr>`;
  });
  document.getElementById('day-summary').innerHTML=dHtml||'<tr><td colspan="6" class="empty">データなし</td></tr>';

  const byWeek={};
  data.forEach(r=>{const w=weekNum(r.date);if(!byWeek[w])byWeek[w]={cash:0,cl:0,total:0,days:0};byWeek[w].cash+=r.cash;byWeek[w].cl+=r.cl;byWeek[w].total+=r.total;byWeek[w].days++});
  let wHtml='';
  Object.keys(byWeek).sort((a,b)=>+a-+b).forEach(w=>{
    const wk=byWeek[w];
    wHtml+=`<tr>
      <td>第${w}週</td>
      <td class="num" style="color:#185fa5">¥${fmt(wk.cash)}</td>
      <td class="num" style="color:#3b6d11">¥${fmt(wk.cl)}</td>
      <td class="num total">¥${fmt(wk.total)}</td>
      <td class="num">¥${fmt(wk.days?wk.total/wk.days:0)}</td>
    </tr>`;
  });
  document.getElementById('week-summary').innerHTML=wHtml||'<tr><td colspan="5" class="empty">データなし</td></tr>';

  renderChart(data);
}

function setChart(mode,btn){
  chartMode=mode;
  document.querySelectorAll('.chart-btns .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ym=document.getElementById('sum-month')?.value;
  if(!ym)return;
  renderChart(load().filter(r=>toYM(r.date)===ym));
}

function renderChart(data){
  if(chart){chart.destroy();chart=null}
  const ctx=document.getElementById('bar-chart').getContext('2d');
  let labels=[],cashData=[],clData=[];

  if(chartMode==='daily'){
    data.forEach(r=>{
      labels.push(`${r.date.slice(8)}(${DAYS[dayIdx(r.date)]})`);
      cashData.push(r.cash);clData.push(r.cl);
    });
  }else if(chartMode==='weekly'){
    const bw={};
    data.forEach(r=>{const w=weekNum(r.date);if(!bw[w])bw[w]={c:0,l:0};bw[w].c+=r.cash;bw[w].l+=r.cl});
    Object.keys(bw).sort((a,b)=>+a-+b).forEach(w=>{labels.push(`第${w}週`);cashData.push(bw[w].c);clData.push(bw[w].l)});
  }else{
    const bd=Array.from({length:7},()=>({c:0,l:0,n:0}));
    data.forEach(r=>{const i=dayIdx(r.date);bd[i].c+=r.cash;bd[i].l+=r.cl;bd[i].n++});
    DAYS.forEach((d,i)=>{if(bd[i].n){labels.push(d);cashData.push(bd[i].c);clData.push(bd[i].l)}});
  }

  chart=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'現金',data:cashData,backgroundColor:'#3266ad',borderRadius:4,borderSkipped:false},
      {label:'キャッシュレス',data:clData,backgroundColor:'#639922',borderRadius:4,borderSkipped:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`¥${fmt(c.raw)}`}}},
      scales:{
        x:{stacked:true,ticks:{autoSkip:false,maxRotation:45,font:{size:11}}},
        y:{stacked:true,ticks:{callback:v=>`¥${fmt(v)}`,font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}}
      }
    }
  });
}

populateMonthSelects();
</script>

<!-- Service Worker登録 -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(r=>{
      console.log('SW registered');
    }).catch(e=>{console.log('SW failed:',e)});
  });
}
</script>
</body>
</html>
